<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lukas Licon</title>
    <script>
      (function() {
        var stored = localStorage.getItem('portfolio-theme');
        var theme = (stored === 'light' || stored === 'dark') ? stored : (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/generalstyles.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/aboutsection.css">
    <link rel="stylesheet" href="css/projectsection.css">
    <link rel="stylesheet" href="css/educationsection.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/effects.css">
    <link rel="stylesheet" href="css/media.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">


</head>
<body>
    <div class="bg-effects" aria-hidden="true">
      <div class="bg-gradient"></div>
      <div class="bg-stars" id="bg-stars"></div>
      <div class="bg-spotlight" id="bg-spotlight"></div>
      <div class="bg-geometry">
        <div class="bg-circuit-lines"></div>
      </div>
      <div class="bg-nodes">
        <span class="bg-node" data-node="0"></span>
        <span class="bg-node" data-node="1"></span>
        <span class="bg-node" data-node="2"></span>
        <span class="bg-node" data-node="3"></span>
        <span class="bg-node" data-node="4"></span>
        <span class="bg-node" data-node="5"></span>
        <span class="bg-node" data-node="6"></span>
        <span class="bg-node" data-node="7"></span>
      </div>
      <div class="bg-grid"></div>
      <div class="bg-noise"></div>
    </div>
    <div id="root"></div>

    <script>
      (function() {
        var root = document.documentElement;
        function setMouse(x, y) {
          root.style.setProperty('--mouse-x', x + 'px');
          root.style.setProperty('--mouse-y', y + 'px');
          root.style.setProperty('--mouse-x-pct', (x / window.innerWidth).toFixed(4));
          root.style.setProperty('--mouse-y-pct', (y / window.innerHeight).toFixed(4));
        }
        document.addEventListener('mousemove', function(e) { setMouse(e.clientX, e.clientY); });
        document.addEventListener('touchmove', function(e) {
          if (e.touches.length) setMouse(e.touches[0].clientX, e.touches[0].clientY);
        }, { passive: true });

        var starsEl = document.getElementById('bg-stars');
        var stars = [];
        var PUSH_RADIUS = 120;
        var PUSH_STRENGTH = 2.5;
        var RESPAWN_MS = 2500;
        var STAR_DRAG = 0.985;
        var STAR_MIN_SPEED = 0.02;

        function getViewport() {
          return { w: window.innerWidth, h: window.innerHeight };
        }

        function createStars() {
          if (!starsEl) return;
          var v = getViewport();
          for (var i = 0; i < 100; i++) {
            var s = document.createElement('span');
            s.className = 'star';
            s.style.animationDelay = (Math.random() * 3) + 's';
            s.style.animationDuration = (2 + Math.random() * 2) + 's';
            starsEl.appendChild(s);
            stars.push({
              el: s,
              x: Math.random() * v.w,
              y: Math.random() * v.h,
              vx: 0,
              vy: 0,
              offScreenSince: null
            });
          }
        }

        function respawnStar(star, v) {
          star.x = 8 + Math.random() * (v.w - 16);
          star.y = 8 + Math.random() * (v.h - 16);
          star.vx = 0;
          star.vy = 0;
          star.offScreenSince = null;
        }

        function runStarLoop() {
          var v = getViewport();
          var now = Date.now();
          for (var i = 0; i < stars.length; i++) {
            var star = stars[i];
            star.x += star.vx;
            star.y += star.vy;
            if (star.x < 0) { star.x = 0; star.vx = -star.vx; star.offScreenSince = null; }
            if (star.x > v.w) { star.x = v.w; star.vx = -star.vx; star.offScreenSince = null; }
            if (star.y < 0) { star.y = 0; star.vy = -star.vy; star.offScreenSince = null; }
            if (star.y > v.h) { star.y = v.h; star.vy = -star.vy; star.offScreenSince = null; }
            star.vx *= STAR_DRAG;
            star.vy *= STAR_DRAG;
            var speed = Math.sqrt(star.vx * star.vx + star.vy * star.vy);
            if (speed < STAR_MIN_SPEED) { star.vx = 0; star.vy = 0; }
            var onScreen = star.x >= 0 && star.x <= v.w && star.y >= 0 && star.y <= v.h;
            if (!onScreen) {
              if (star.offScreenSince === null) star.offScreenSince = now;
              if (now - star.offScreenSince > RESPAWN_MS) respawnStar(star, v);
            } else {
              star.offScreenSince = null;
            }
            star.el.style.left = star.x + 'px';
            star.el.style.top = star.y + 'px';
          }
          requestAnimationFrame(runStarLoop);
        }

        if (starsEl && !window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
          createStars();
          runStarLoop();
          window.addEventListener('resize', function() {
            var v = getViewport();
            for (var i = 0; i < stars.length; i++) {
              var star = stars[i];
              if (star.x > v.w) { star.x = v.w; star.vx = -Math.abs(star.vx); }
              if (star.y > v.h) { star.y = v.h; star.vy = -Math.abs(star.vy); }
            }
          });
        } else if (starsEl) {
          for (var i = 0; i < 100; i++) {
            var s = document.createElement('span');
            s.className = 'star';
            s.style.left = (Math.random() * 100) + '%';
            s.style.top = (Math.random() * 100) + '%';
            s.style.animationDelay = (Math.random() * 3) + 's';
            s.style.animationDuration = (2 + Math.random() * 2) + 's';
            starsEl.appendChild(s);
          }
        }

        function fireShootingStar() {
          if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
          var effects = document.querySelector('.bg-effects');
          if (!effects) return;
          var star = document.createElement('span');
          star.className = 'shooting-star' + (Math.random() < 0.5 ? ' shooting-star-rtl' : '');
          star.style.setProperty('--star-top', (5 + Math.random() * 35) + '%');
          effects.appendChild(star);
          setTimeout(function() { star.remove(); }, 2000);
        }
        function scheduleShootingStar() {
          fireShootingStar();
          setTimeout(scheduleShootingStar, 45000 + Math.random() * 15000);
        }
        setTimeout(scheduleShootingStar, 3000);

        document.addEventListener('click', function(e) {
          if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
          var effects = document.querySelector('.bg-effects');
          if (!effects) return;
          var r = document.createElement('span');
          r.className = 'bg-click-ripple';
          r.style.left = e.clientX + 'px';
          r.style.top = e.clientY + 'px';
          effects.appendChild(r);
          setTimeout(function() { r.remove(); }, 800);
          var cx = e.clientX, cy = e.clientY;
          for (var i = 0; i < stars.length; i++) {
            var star = stars[i];
            var dx = star.x - cx, dy = star.y - cy;
            var dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < PUSH_RADIUS && dist > 0) {
              var falloff = 1 - dist / PUSH_RADIUS;
              var force = PUSH_STRENGTH * falloff;
              star.vx += (dx / dist) * force;
              star.vy += (dy / dist) * force;
            }
          }
        });
      })();
    </script>
    <!-- React and ReactDOM from a CDN -->
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js" crossorigin></script>    

    <!-- Babel to compile JSX in the browser (for development) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- JavaScript code -->
    <script type="text/babel" src="script.js"></script>
</body>
</html>
